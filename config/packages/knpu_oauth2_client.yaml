knpu_oauth2_client:
    clients:
        azure:
            type: azure
            client_id: '%env(AZURE_CLIENT_ID)%'
            client_secret: '%env(AZURE_CLIENT_SECRET)%'
            redirect_route: app_azure_check
            redirect_params: {}
            tenant: '%env(AZURE_TENANT_ID)%'
            default_end_point_version: '2.0'
            scope:
                - openid
                - profile
                - email
                - 'User.Read'
